<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Phishing Detection Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2">
</head>

<body>

<div class="bg-scene">
  <div class="circuit-lines"></div>
</div>

<!-- ✅ RESTORED RINGS + LOCK -->
<div class="shield-wrapper">
  <div class="shield-rings">

    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="ring ring-4"></div>
    <div class="ring ring-5"></div>
    <div class="ring ring-6"></div>

    <div class="seg-lines"></div>

    <!-- LOCK ICON -->
    <div class="shield-icon">
      <svg viewBox="0 0 100 115" fill="none">
        <path d="M50 4 L92 22 L92 56 C92 80 72 100 50 111 C28 100 8 80 8 56 L8 22 Z"
              fill="rgba(14,40,120,0.4)"
              stroke="#93c5fd" stroke-width="2"/>
        <rect x="35" y="58" width="30" height="24" rx="3" fill="#93c5fd"/>
        <path d="M42 58 L42 50 C42 42 58 42 58 50 L58 58"
              stroke="#93c5fd" stroke-width="4"/>
      </svg>
    </div>

  </div>
</div>

<div class="page">

<nav>
  <div class="logo">Logo</div>
  <ul class="nav-links">
    <li><a href="#">How it Works</a></li>
    <li><a href="#">Features</a></li>
    <li><a href="#">Resources</a></li>
  </ul>
</nav>

<section class="hero">
  <h1>URL Phishing Detection Tool</h1>
  <p>Check whether a website is safe or potentially harmful before you proceed</p>

  <div class="search-box">
    <input type="text" id="urlInput" placeholder="Enter a website URL">
    <button class="btn-scan" id="scanBtn">Scan Now</button>
  </div>

  <!-- RESULT -->
  <div id="resultArea" class="result-area">
    <div class="result-box" id="resultBox">
      <div id="resultLabel"></div>
      <div id="resultMsg"></div>
    </div>

    <!-- FEATURES -->
    <div class="features">

      <div class="feature-card">
        <p>Domain Age(in days)</p>
        <h3 id="domainAge">-</h3>
      </div>

      <div class="feature-card">
        <p>Safe Browsing</p>
        <h3 id="safeBrowsing">-</h3>
      </div>

      <div class="feature-card">
        <p>Phishing Risk</p>
        <h3 id="aiScore">-</h3>
      </div>

    </div>

  </div>

</section>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}?v=2"></script>
</body>
</html>
